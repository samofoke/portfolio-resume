<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F0D"/>
      <stop offset="100%" stop-color="#141C18"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B39C77"/>
      <stop offset="50%" stop-color="#A68D69"/>
      <stop offset="100%" stop-color="#9F8871"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FD1C5"/>
      <stop offset="100%" stop-color="#2C7A7B"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.08" stroke="#A68D69" stroke-width="0.4">
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
  </g>

  <!-- Border glow -->
  <rect x="2" y="2" width="60" height="60" rx="7" fill="none" stroke="url(#glow)" stroke-width="1.2" opacity="0.4"/>

  <!-- Corner brackets -->
  <path d="M7,3 L3,3 L3,7" fill="none" stroke="#B39C77" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <path d="M57,3 L61,3 L61,7" fill="none" stroke="#B39C77" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <path d="M7,61 L3,61 L3,57" fill="none" stroke="#B39C77" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <path d="M57,61 L61,61 L61,57" fill="none" stroke="#B39C77" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>

  <!-- Terminal prompt symbol -->
  <g filter="url(#neon)">
    <text x="14" y="42" font-family="'Courier New',monospace" font-weight="700" font-size="26" fill="url(#cyan)" opacity="0.9">&gt;_</text>
  </g>

  <!-- SM initials -->
  <text x="56" y="18" text-anchor="end" font-family="'Courier New',monospace" font-weight="700" font-size="11" fill="url(#glow)" opacity="0.6" letter-spacing="1">SM</text>

  <!-- Scanline accents -->
  <rect x="6" y="50" width="16" height="0.6" fill="#A68D69" opacity="0.15" rx="0.3"/>
  <rect x="42" y="26" width="14" height="0.6" fill="#B39C77" opacity="0.12" rx="0.3"/>

  <!-- Circuit dots -->
  <circle cx="54" cy="54" r="1.2" fill="#A68D69" opacity="0.35"/>
  <circle cx="10" cy="10" r="1.2" fill="#A68D69" opacity="0.35"/>
</svg>
